<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek NISN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 600;
        }

        .card p.subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #5a6fd6;
        }

        button:disabled {
            background-color: #a5b4fc;
            cursor: not-allowed;
        }

        #hasil {
            margin-top: 25px;
            display: none;
        }

        .hasil-sukses {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            color: #166534;
        }

        .hasil-sukses p {
            margin: 5px 0;
        }

        .hasil-gagal {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            padding: 15px;
            border-radius: 8px;
            color: #991b1b;
            font-size: 14px;
        }
        
        .loading {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cek NISN</h2>
        <p class="subtitle">Masukkan nama lengkap untuk melihat NISN</p>
        
        <input type="text" id="inputNama" placeholder="Contoh: Yogi Satria Mandala" autocomplete="off">
        <button id="btnCari" onclick="cariNISN()">Lihat Hasil</button>

        <div id="hasil"></div>
    </div>

    <script>
        // ISI DENGAN URL GOOGLE APPS SCRIPT ANDA YANG DISALIN PADA LANGKAH 3
        const URL_API = "https://script.google.com/macros/s/AKfycbyBwNo5Clsy8DtkFQhEZ7GJeRfCcEjb2OpAeLA5-V18H2djBhM7-8OTvRryMlqmJUxO/exec";

        async function cariNISN() {
            const input = document.getElementById('inputNama').value;
            const tempatHasil = document.getElementById('hasil');
            const tombol = document.getElementById('btnCari');
            
            if(input.trim() === "") {
                tempatHasil.style.display = "block";
                tempatHasil.innerHTML = `<div class="hasil-gagal">Silakan masukkan nama terlebih dahulu!</div>`;
                return;
            }

            // Tampilkan status loading dan matikan tombol sementara
            tempatHasil.style.display = "block";
            tempatHasil.innerHTML = `<div class="loading">Sedang mencari data...</div>`;
            tombol.disabled = true;

            try {
                // Mengirim permintaan ke Google Sheets secara real-time
                const tanggapan = await fetch(`${URL_API}?nama=${encodeURIComponent(input)}`);
                const hasilJson = await tanggapan.json();

                if (hasilJson.status === "sukses") {
                    tempatHasil.innerHTML = `
                        <div class="hasil-sukses">
                            <p><strong>Nama:</strong> ${hasilJson.data.nama}</p>
                            <p><strong>NISN:</strong> ${hasilJson.data.nisn}</p>
                        </div>
                    `;
                } else {
                    tempatHasil.innerHTML = `
                        <div class="hasil-gagal">
                            Data siswa tidak ditemukan. Pastikan nama lengkap diketik dengan benar.
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                tempatHasil.innerHTML = `
                    <div class="hasil-gagal">
                        Gagal terhubung ke server. Periksa koneksi internet atau URL API Anda.
                    </div>
                `;
            } finally {
                // Aktifkan kembali tombol cari
                tombol.disabled = false;
            }
        }
    </script>
</body>
</html>
